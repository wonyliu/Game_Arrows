<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%236f4f35'/%3E%3Ccircle cx='20' cy='28' r='8' fill='%23f5dcb6'/%3E%3Ccircle cx='44' cy='28' r='8' fill='%23f5dcb6'/%3E%3Cellipse cx='32' cy='40' rx='14' ry='11' fill='%23c79567'/%3E%3Ccircle cx='36' cy='39' r='3' fill='%23ff84a7'/%3E%3C/svg%3E">
    <title>田鼠家族大逃脱</title>
    <meta name="description" content="点击释放呆萌田鼠，清空洞穴迷宫。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=26">
</head>
<body>
    <div class="app-container">
        <header class="wechat-header">
            <div class="wechat-left">
                <span class="icon-wechat-back"></span>
            </div>
            <div class="wechat-title">田鼠家族大逃脱</div>
            <div class="wechat-capsule">
                <span class="capsule-dot"></span>
                <span class="capsule-divider"></span>
                <span class="capsule-ring"></span>
            </div>
        </header>

        <div class="background-pattern"></div>

        <div id="topResources" class="top-resources">
            <div class="resource-badge">
                <img class="pixel-icon resource-icon-img" src="assets/ui/pixel/coin.svg" alt="acorn">
                <span id="coinCount">20</span>
            </div>
            <div class="resource-badge">
                <img class="pixel-icon resource-icon-img" src="assets/ui/pixel/energy.svg" alt="clover">
                <span id="energyCount">5</span>
            </div>
            <div class="energy-timer">恢复中</div>
        </div>

        <aside id="sideBar" class="side-bar">
            <button class="side-btn" type="button" aria-label="settings">
                <img class="pixel-icon side-icon" src="assets/ui/pixel/settings.svg" alt="settings">
            </button>
            <button class="side-btn side-btn-community" type="button">
                <img class="pixel-icon side-btn-icon" src="assets/ui/pixel/community.svg" alt="family">
                <span class="side-btn-label">家族</span>
            </button>
        </aside>

        <main class="game-container">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
            </div>
        </main>

        <div id="hud" class="hidden">
            <div class="hud-top">
                <button class="hud-settings" type="button" aria-label="settings">
                    <img class="pixel-icon side-icon" src="assets/ui/pixel/settings.svg" alt="settings">
                </button>
                <div class="hud-center">
                    <div id="levelInfo" class="hud-level">洞穴 3</div>
                    <div id="lives" class="hud-lives"></div>
                    <div id="timer" class="hud-timer hidden">10m00s</div>
                </div>
            </div>

            <div class="hud-bottom">
                <div class="progress-container">
                    <div class="progress-btn">&lt;</div>
                    <div class="progress-bar-wrapper">
                        <div id="progressBarFill" class="progress-bar-fill"></div>
                        <div id="progressThumb" class="progress-thumb"></div>
                    </div>
                    <div class="progress-btn">&gt;</div>
                </div>

                <div class="items-container">
                    <button id="btnUndo" class="item-btn item-btn-eraser" type="button" aria-label="undo">
                        <img class="pixel-icon item-icon-img" src="assets/ui/pixel/undo.svg" alt="undo">
                        <span class="badge-plus">+</span>
                    </button>
                    <button id="btnHint" class="item-btn item-btn-wand" type="button" aria-label="hint">
                        <img class="pixel-icon item-icon-img" src="assets/ui/pixel/wand.svg" alt="hint">
                        <span class="badge-plus">+</span>
                    </button>
                    <button id="btnShuffle" class="item-btn item-btn-clock" type="button" aria-label="shuffle">
                        <img class="pixel-icon item-icon-img" src="assets/ui/pixel/shuffle.svg" alt="shuffle">
                        <span class="badge-plus">+</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="menuOverlay" class="overlay">
            <div class="menu-content">
                <div class="logo-area">
                    <div class="logo-arrow">田鼠</div>
                    <div class="logo-line"></div>
                    <div class="logo-clear">出洞</div>
                </div>

                <div class="banner-stack">
                    <div class="banner banner-workshop">家族训练营</div>
                    <div class="banner banner-snow">
                        <span>田野派对</span>
                        <small>今日免费 x1</small>
                    </div>
                </div>

                <div class="play-area">
                    <button id="btnPlay" class="btn-play" type="button">开始蠕动</button>
                    <button id="btnLevels" class="current-level-tag" type="button">洞穴 3</button>
                </div>
                <a class="dev-entry" href="admin.html">关卡工坊</a>

                <button class="float-btn float-left-top" type="button">
                    <span class="float-icon"><img class="pixel-icon float-icon-img" src="assets/ui/pixel/more-games.svg" alt="home"></span>
                    <span class="float-label">田鼠窝</span>
                </button>
                <button class="float-btn float-left-bottom" type="button">
                    <span class="float-icon"><img class="pixel-icon float-icon-img" src="assets/ui/pixel/gift.svg" alt="gift"></span>
                    <span class="float-label">胡萝卜箱</span>
                </button>
                <button class="float-btn float-right-top" type="button">
                    <span class="float-icon"><img class="pixel-icon float-icon-img" src="assets/ui/pixel/theme.svg" alt="theme"></span>
                    <span class="float-label">家族皮肤</span>
                </button>
                <button class="float-btn float-right-bottom" type="button">
                    <span class="float-icon"><img class="pixel-icon float-icon-img" src="assets/ui/pixel/rank.svg" alt="rank"></span>
                    <span class="float-label">洞穴榜</span>
                </button>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item" type="button">
                    <span class="nav-icon"><img class="pixel-icon nav-icon-img" src="assets/ui/pixel/collection.svg" alt="collection"></span>
                    <span class="nav-label">收藏</span>
                </button>
                <button class="nav-item active" type="button">
                    <span class="nav-icon"><img class="pixel-icon nav-icon-img" src="assets/ui/pixel/home.svg" alt="home"></span>
                    <span class="nav-label">洞穴</span>
                </button>
                <button class="nav-item" type="button">
                    <span class="nav-icon"><img class="pixel-icon nav-icon-img" src="assets/ui/pixel/challenge.svg" alt="challenge"></span>
                    <span class="nav-label">挑战</span>
                </button>
            </nav>
        </div>

        <div id="levelCompleteOverlay" class="overlay hidden">
            <div class="popup-box">
                <h2 class="popup-title">全员出洞</h2>
                <div id="levelScore" class="popup-score">Score: 0</div>
                <div class="popup-buttons">
                    <button id="btnNext" class="btn-popup-primary" type="button">下一洞穴</button>
                    <button id="btnMenuFromComplete" class="btn-popup-secondary" type="button">返回窝点</button>
                </div>
            </div>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <div class="popup-box">
                <h2 class="popup-title">田鼠累趴了</h2>
                <div id="gameOverReason" class="popup-score">Out of lives</div>
                <div class="popup-buttons">
                    <button id="btnRetry" class="btn-popup-primary" type="button">再来一窝</button>
                    <button id="btnMenuFromOver" class="btn-popup-secondary" type="button">返回窝点</button>
                </div>
            </div>
        </div>

        <div id="levelSelectOverlay" class="overlay hidden">
            <div class="popup-box popup-box-levels">
                <h2 class="popup-title">选择洞穴</h2>
                <div id="levelGrid" class="level-grid"></div>
                <button id="btnBackFromSelect" class="btn-popup-secondary" type="button">返回</button>
            </div>
        </div>

        <div id="errorVignette" class="error-vignette"></div>
    </div>

    <script type="module" src="js/main.js?v=34"></script>
</body>
</html>
